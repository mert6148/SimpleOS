<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="document" contenteditable="true">
        <div class="paragraph">
            <h1>Sample Document</h1>
            <p></p>
            <span class="text">This is a sample Google Docs document. You can edit this text and see how it works!</span>
        </div>
    </div>

    <div class="container" id="container">
        <div class="toolbar">
            <button id="bold-btn">Bold</button>
            <button id="italic-btn">Italic</button>
            <button id="underline-btn">Underline</button>
        </div>
        <div class="editor" contenteditable="true">
            <p>Start editing here...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
