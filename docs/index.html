<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>SimpleOS Dokümantasyon Görüntüleyici</title>
    <meta name="description" content="Google Docs entegrasyonlu modern dokümantasyon görüntüleyici">
    
    <!-- Styles -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #f6ad55;
            --danger: #f56565;
            --info: #4299e1;
            
            --text-dark: #1a202c;
            --text-light: #cbd5e0;
            --bg-light: #f7fafc;
            --bg-dark: #1a202c;
            --border: #e2e8f0;
            
            --radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --text-dark: #f7fafc;
            --text-light: #a0aec0;
            --bg-light: #2d3748;
            --bg-dark: #1a202c;
            --border: #4a5568;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            font-size: 1.25rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Main Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background-color: var(--bg-light);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1.5rem;
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-section h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        /* Document Viewer */
        #doc-viewer {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: white;
            color: var(--text-dark);
        }

        [data-theme="dark"] #doc-viewer {
            background-color: #2d3748;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #5a67d8;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background-color: var(--bg-dark);
            color: white;
        }

        .btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-dialog {
            position: relative;
            z-index: 1001;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        [data-theme="dark"] .modal-dialog {
            background: #2d3748;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* Notifications */
        #notifications {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 2000;
        }

        .notification {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        .notification-success {
            border-left: 4px solid var(--success);
        }

        .notification-error {
            border-left: 4px solid var(--danger);
        }

        .notification-warning {
            border-left: 4px solid var(--warning);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Spinner */
        #loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2001;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Code blocks */
        pre {
            background-color: #282c34;
            color: #abb2bf;
            padding: 1rem;
            border-radius: var(--radius);
            overflow-x: auto;
            margin: 1rem 0;
        }

        code {
            font-family: 'Courier New', monospace;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }

            aside {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 30vh;
            }

            header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <span>SimpleOS Dokümantasyon</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="theme-toggle" title="Tema değiştir">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn btn-secondary" id="refresh-btn" title="Yenile">
                <i class="fas fa-sync"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Sidebar -->
        <aside>
            <div class="sidebar-section">
                <h3>Google Dökümanlar</h3>
                <button class="btn btn-primary" id="import-btn" style="width: 100%; margin-bottom: 0.5rem;">
                    <i class="fas fa-download"></i> İçe Aktar
                </button>
                <button class="btn btn-primary" id="sync-btn" style="width: 100%; margin-bottom: 0.5rem;">
                    <i class="fas fa-sync"></i> Senkronize Et
                </button>
                <button class="btn btn-primary" id="search-btn" style="width: 100%;">
                    <i class="fas fa-search"></i> Ara
                </button>
            </div>

            <div class="sidebar-section">
                <h3>İhracat</h3>
                <button class="btn btn-secondary" id="export-html-btn" style="width: 100%; margin-bottom: 0.5rem;">
                    <i class="fas fa-html5"></i> HTML
                </button>
                <button class="btn btn-secondary" id="export-markdown-btn" style="width: 100%; margin-bottom: 0.5rem;">
                    <i class="fas fa-markdown"></i> Markdown
                </button>
                <button class="btn btn-secondary" id="export-pdf-btn" style="width: 100%;">
                    <i class="fas fa-file-pdf"></i> PDF
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Belgeler</h3>
                <div id="documents-list"></div>
                <button class="btn btn-secondary" id="clear-cache-btn" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-trash"></i> Önbelleği Temizle
                </button>
            </div>
        </aside>

        <!-- Document Viewer -->
        <div id="doc-viewer">
            <div style="text-align: center; color: var(--text-light); margin-top: 3rem;">
                <i class="fas fa-book" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h2>Belge seçmek için sol panelden başlayın</h2>
                <p>Google Docs belgelerinizi içe aktarın, senkronize edin ve görüntüleyin</p>
            </div>
        </div>
    </main>

    <!-- Loading Spinner -->
    <div id="loading-spinner" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Notifications Container -->
    <div id="notifications"></div>

    <!-- Google Sync Status -->
    <div id="sync-status"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- App Scripts -->
    <script src="chromium_app.js"></script>
</body>
</html>
